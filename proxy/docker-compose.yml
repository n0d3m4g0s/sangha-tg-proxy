services:
  mtprotoproxy:
    build:
      context: .
    container_name: sangha-mtproto
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../data/config.py:/home/tgproxy/config.py:ro
    logging:
      driver: json-file
      options:
        max-file: "10"
        max-size: "10m"
    mem_limit: 512m

  api:
    build:
      context: ../api
    container_name: sangha-api
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - ../data/config.py:/data/config.py
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SANGHA_API_KEY=${SANGHA_API_KEY}
      - CONFIG_PATH=/data/config.py
      - PROXY_CONTAINER=sangha-mtproto
      - TLS_DOMAIN=${TLS_DOMAIN:-ya.ru}
      - PUBLIC_SERVER=${RUSSIAN_VM_HOST:-tg.rigpa.space}
      - PUBLIC_PORT=${PUBLIC_PORT:-443}
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: "5m"
    mem_limit: 128m
